name: Production Monitor

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: production-monitor
  cancel-in-progress: true

jobs:
  verify-production:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SITE_OWNER: CashForClankers
      SITE_REPO: cobanos-tours
      SITE_DOMAIN: los-cobanos.com
      SITE_BRANCH: main
      SITE_SOURCE_PATH: /
      VERIFY_RETRIES: 18
      VERIFY_DELAY_MS: 10000

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify GitHub Pages and live domain
        run: node scripts/verify-production.mjs
